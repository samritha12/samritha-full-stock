<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: block;
            background-color: lightslategray;
            width: 100px;
        }
        .inline{
            display: inline;
            background-color: aqua;
            width: 100px;
        }
        .inlineblock{
            display: inline-block;
            background-color: red;
            width: 100px;
        }
        .navbar{
            background-color: salmon;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }
        .list{
            list-style: none;
        }
        .link{
            text-decoration: none;
            color: black;
            padding: 10px;
            background-color: papayawhip;
            border-radius: 10px;
        }
        .link:hover{
            cursor: pointer;
            background-color: blanchedalmond;
            color: antiquewhite;
        }
    </style>
</head>
<body>
    <nav>
        <ul class="navbar">
            <li class="list"><a href=""class="link">home</a></li>
            <li class="list"><a href=""class="link">about</a></li>
            <li class="list"><a href=""class="link">contact</a></li>
            <li class="list"><a href=""class="link">service</a></li>
        </ul>
    </nav>
    <p class="container">Lorem ipsum dolor sit amet.</p>
    <p class="inline">Lorem ipsum dolor sit amet.</p>
    <p class="inlineblock">Lorem ipsum dolor sit amet.</p>
    <span>Lorem ipsum dolor sit amet.</span>
</body>
</html>
